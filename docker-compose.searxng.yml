services:
  redis:
    container_name: redis
    image: redis:alpine
    command: redis-server --save "" --appendonly no
    networks:
      - searxng
    tmpfs:
      - /var/lib/redis
    restart: always

  searxng:
    container_name: searxng
    image: searxng/searxng:latest
    networks:
      - searxng
    ports:
      - "127.0.0.1:8088:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8088/
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    depends_on:
      - redis
    restart: always

  searchinlet:
    container_name: searchinlet
    build: .
    restart: always
    volumes:
      - ./searchinlet.db:/root/searchinlet.db
      - ./.env:/root/.env
    environment:
      - SEARXNG_URL=http://searxng:8080/search
      - TRANSPORT_MODE=admin
      - HTTP_PORT=8080
      - DB_PATH=/root/searchinlet.db
    env_file:
      - .env
    networks:
      - searxng
    depends_on:
      - searxng

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
    networks:
      - searxng
    depends_on:
      - searchinlet

networks:
  searxng:
    ipam:
      driver: default

volumes:
  caddy_data:
  caddy_config:

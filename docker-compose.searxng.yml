services:
  redis:
    container_name: redis
    image: redis:alpine
    command: redis-server --save "" --appendonly no
    networks:
      - searxng
    tmpfs:
      - /var/lib/redis
    restart: always

  searxng:
    container_name: searxng
    image: searxng/searxng:latest
    networks:
      - searxng
    ports:
      - "127.0.0.1:8088:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8088/
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    depends_on:
      - redis
    restart: always

networks:
  searxng:
    ipam:
      driver: default

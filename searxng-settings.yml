# SearXNG settings - Production Ready
use_default_settings: true

general:
  debug: false
  instance_name: "SearchInlet SearXNG"
  donation_url: false
  contact_url: false

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "searchinlet-extremely-secure-and-long-secret-key-12345"
  base_url: http://localhost:8080/
  image_proxy: true

ui:
  static_use_hash: true

engines:
  - name: google
    engine: google
    shortcut: g
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
  - name: bing
    engine: bing
    shortcut: b
